<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Arcade Terminal</title>
    
    <!-- 🛰️ PWA Integration Matrix -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* --- Global Theme --- */
        :root {
            --primary: #6c5ce7;
            --accent: #a29bfe;
            --bg-dark: #0f0c29;
            --text-light: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.07);
            --neon-cyan: #00ffcc;
            --neon-pink: #ff007f;
        }

        /* --- Global Styles --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at top, #1b1445 0%, var(--bg-dark) 45%, #050510 100%);
            color: var(--text-light);
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Space Background --- */
        #space-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* --- Particles --- */
        .particle {
            position: absolute;
            top: -20vh;
            opacity: 0;
            pointer-events: none;
            animation: streak linear infinite;
        }

        .star {
            width: 2px;
            border-radius: 999px;
            background: linear-gradient(to bottom, transparent, var(--accent), white, transparent);
            box-shadow: 0 0 6px var(--accent), 0 0 12px var(--primary);
        }

        .letter {
            color: var(--accent);
            font-weight: bold;
            text-shadow: 0 0 10px var(--accent);
        }

        @keyframes streak {
            0% { transform: translate(20vw, -20vh) rotate(20deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-120vw, 120vh) rotate(20deg); opacity: 0; }
        }

        /* --- Main Tablet Grid Layout --- */
        .main-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 15px;
            gap: 15px;
        }

        /* --- Sidebar Modules (Telemetry & Analytics) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 15px rgba(108, 92, 231, 0.2);
            box-sizing: border-box;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .analytics-item {
            font-size: 0.9rem;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        .analytics-value {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            font-weight: bold;
        }

        /* --- Central Core (Game/Content Zone) --- */
        .center-core {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        header {
            text-align: center;
            padding: 5px 0;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            color: white;
            text-shadow: 0 0 15px var(--primary), 0 0 5px var(--accent);
            letter-spacing: 2px;
        }

        /* The central window where code/canvas will live */
        .viewport-screen {
            flex-grow: 1;
            margin: 15px 0;
            background: rgba(5, 5, 15, 0.65);
            border: 2px solid var(--primary);
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(108, 92, 231, 0.3), inset 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .viewport-placeholder {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 1.2rem;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.3; text-shadow: 0 0 0px var(--primary); }
            100% { opacity: 0.8; text-shadow: 0 0 10px var(--primary); }
        }

        /* --- Neon Mobile/Tablet Touch Controllers --- */
        .d-pad, .action-buttons {
            display: grid;
            gap: 10px;
            width: 100%;
        }

        .d-pad {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .action-buttons {
            grid-template-columns: 1fr;
        }

        .ctrl-btn {
            background: rgba(108, 92, 231, 0.15);
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            touch-action: manipulation;
            transition: background 0.1s, transform 0.1s;
        }

        /* Button Grid Positions */
        .btn-up    { grid-column: 2; grid-row: 1; border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .btn-left  { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down  { grid-column: 2; grid-row: 3; }

        .btn-action-a { border-color: var(--neon-pink); color: var(--neon-pink); min-height: 70px; }
        .btn-action-b { border-color: var(--accent); color: var(--accent); min-height: 70px; }

        /* Tactile feedback on press */
        .ctrl-btn:active {
            background: rgba(108, 92, 231, 0.5);
            transform: scale(0.95);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Responsive Layout Overrides for Portrait Displays */
        @media (max-width: 850px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }
            .sidebar {
                flex-direction: row;
                height: auto;
            }
            .card { flex: 1; }
            .d-pad, .action-buttons {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: 1fr;
            }
            .btn-up { grid-column: 1; grid-row: 1; }
            .btn-left { grid-column: 2; grid-row: 1; }
            .btn-right { grid-column: 3; grid-row: 1; }
            .btn-down { grid-column: 4; grid-row: 1; }
        }
    </style>
</head>
<body>

    <!-- Space Background Layer -->
    <div id="space-background"></div>

    <!-- Main Grid Dashboard Framework -->
    <div class="main-container">
        
        <!-- LEFT SIDE PANEL: Directional Core + System Diagnostic Status -->
        <section class="sidebar">
            <div class="card" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;">
                <h2>Navigation</h2>
                <!-- Nav Pad Interface -->
                <div class="d-pad">
                    <button class="ctrl-btn btn-up" onmousedown="triggerInput('UP')">▲</button>
                    <button class="ctrl-btn btn-left" onmousedown="triggerInput('LEFT')">◀</button>
                    <button class="ctrl-btn btn-right" onmousedown="triggerInput('RIGHT')">▶</button>
                    <button class="ctrl-btn btn-down" onmousedown="triggerInput('DOWN')">▼</button>
                </div>
            </div>
            <div class="card">
                <h2>Telemetry</h2>
                <div class="analytics-item"><span>Grid Link:</span><span class="analytics-value">ONLINE</span></div>
                <div class="analytics-item"><span>FPS Status:</span><span class="analytics-value">60.00</span></div>
            </div>
        </section>

        <!-- CENTER CORE: Terminal Viewport Window -->
        <main class="center-core">
            <header>
                <h1>COSMIC TERMINAL v4.0</h1>
            </header>

            <div class="viewport-screen">
                <!-- Content / Future Canvas Container -->
                <div class="viewport-placeholder">
                    [ READY FOR ARCADE CANVAS MATRIX ]
                </div>
            </div>
        </main>

        <!-- RIGHT SIDE PANEL: Weapon/Action Systems + Diagnostics -->
        <section class="sidebar">
            <div class="card" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;">
                <h2>Fire Control</h2>
                <!-- Heavy Primary Action Layout -->
                <div class="action-buttons">
                    <button class="ctrl-btn btn-action-a" onmousedown="triggerInput('ACTION_A')">ACTION ALPHA</button>
                    <button class="ctrl-btn btn-action-b" onmousedown="triggerInput('ACTION_B')">ACTION BETA</button>
                </div>
            </div>
            <div class="card">
                <h2>Analytics</h2>
                <div class="analytics-item"><span>Sector Score:</span><span class="analytics-value" id="live-score">00000</span></div>
                <div class="analytics-item"><span>Warp Factor:</span><span class="analytics-value">Lvl 01</span></div>
            </div>
        </section>

    </div>

    <script>
        // =======================================================
        // 📡 SYSTEM PROTOCOL 1: SPACE MATRIX MATRIX PARTICLES
        // =======================================================
        const particleCount = 75;
        const container = document.getElementById('space-background');
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const isStar = Math.random() > 0.15;

            if (isStar) {
                particle.classList.add('star');
                particle.style.height = (Math.random() * 80 + 20) + 'px';
            } else {
                particle.classList.add('letter');
                particle.innerText = letters.charAt(Math.floor(Math.random() * letters.length));
                particle.style.fontSize = (Math.random() * 1.0 + 0.7) + 'rem';
            }

            particle.style.left = Math.random() * 220 + 'vw';
            particle.style.animationDuration = (Math.random() * 8 + 5) + 's';
            particle.style.animationDelay = (Math.random() * 6) + 's';
            particle.style.opacity = Math.random() * 0.6 + 0.3;
            container.appendChild(particle);
        }

        for (let i = 0; i < particleCount; i++) { createParticle(); }

        // =======================================================
        // 🔊 SYSTEM PROTOCOL 2: REAL-TIME RETRO AUDIO ENGINE
        // =======================================================
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playLaser() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playExplosion() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            playBlip() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            }
        };

        // =======================================================
        // 🎮 SYSTEM PROTOCOL 3: FLIGHT CONTROLLER ROUTING MATRIX
        // =======================================================
        let dynamicScore = 0;
        function triggerInput(command) {
            console.log(`🛰️ Telemetry Input Logged: ${command}`);
            
            // Connect synthesizer sound effects to specific interface commands
            if (command === 'ACTION_A') {
                AudioEngine.playLaser();
                dynamicScore += 100;
            } else if (command === 'ACTION_B') {
                AudioEngine.playExplosion();
                dynamicScore += 500;
            } else {
                AudioEngine.playBlip();
                dynamicScore += 10;
            }
            
            // Update terminal diagnostics telemetry view
            document.getElementById('live-score').innerText = String(dynamicScore).padStart(5, '0');
        }

        // Add physical mapping hooks for desktop testing phases
        window.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'UP', 'KeyW': 'UP',
                'ArrowLeft': 'LEFT', 'KeyA': 'LEFT',
                'ArrowRight': 'RIGHT', 'KeyD': 'RIGHT',
                'ArrowDown': 'DOWN', 'KeyS': 'DOWN',
                'Space': 'ACTION_A', 'KeyZ': 'ACTION_A',
                'KeyX': 'ACTION_B'
            };
            if (keyMap[e.code]) {
                e.preventDefault();
                triggerInput(keyMap[e.code]);
            }
        });

        // =======================================================
        // 📡 SYSTEM PROTOCOL 4: SERVICE WORKER PWA COUPLING
        // =======================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('🛰️ Service Worker operational scope locked:', reg.scope))
                    .catch(err => console.error('💥 Critical telemetry break: Worker deployment halted:', err));
            });
        }
    </script>
</body>
</html>
